server:
  port: 8080
  tomcat:
    max-http-form-post-size: 10MB

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  # Configuración común a todos los perfiles
  application:
    name: ComerciosConecta_Backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# =========== PERFIL DE DESARROLLO (local) ===========
---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:file:${user.home}/.comerciosconecta/devdb;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show_sql: true
        use_sql_comments: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false

  flyway:
    enabled: false  # Desactivar Flyway en desarrollo con H2

# =========== PERFIL DE PRODUCCIÓN (Render) ===========
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/comerciosconecta}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true

    show-sql: false  # Desactivar en producción

  flyway:
    enabled: true
    baseline-on-migrate: true   # no falla si las tablas ya existen (V1-V3 se marcan como aplicadas)
    baseline-version: 3         # asume que V1, V2, V3 ya fueron aplicadas

---
# =========== CONFIGURACIÓN COMÚN ===========
# (Se aplica a todos los perfiles)
jwt:
  secret: ${JWT_SECRET:change_this_secret_for_production_use_a_strong_secret_here}
  access-expiration-ms: 900000          # 15 min
  refresh-expiration-ms: 604800000      # 7 días

app:
